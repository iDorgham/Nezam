name: ci

on:
  push:
    branches: [main, 'release/**', 'feature/**']
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ -z "$BRANCH_NAME" ]]; then
            echo "Missing head branch name from pull request context."
            exit 1
          fi

          if [[ "$BRANCH_NAME" =~ ^(feature|release|hotfix)\/[a-z0-9._-]+$ ]]; then
            echo "Branch naming check passed: $BRANCH_NAME"
            exit 0
          fi

          echo "Branch naming check failed: $BRANCH_NAME"
          echo "Expected one of:"
          echo "  feature/<spec-id-or-topic>"
          echo "  release/<x.y.z>"
          echo "  hotfix/<x.y.z>"
          exit 1

  conventional-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0
      - name: Validate conventional commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          COMMITS="$(git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}")"
          if [[ -z "$COMMITS" ]]; then
            echo "No commits found in PR range."
            exit 1
          fi

          INVALID=0
          REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: .+'

          for SHA in $COMMITS; do
            SUBJECT="$(git log --format=%s -n 1 "$SHA")"
            if [[ ! "$SUBJECT" =~ $REGEX ]]; then
              echo "Invalid conventional commit: $SHA -> $SUBJECT"
              INVALID=1
            fi
          done

          if [[ "$INVALID" -ne 0 ]]; then
            echo "Conventional commit validation failed."
            echo "Format: type(scope): summary"
            echo "Allowed types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
            exit 1
          fi

          echo "Conventional commit validation passed."

  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - name: Verify onboarding planning artifacts
        run: bash .nezam/scripts/checks/check-onboarding-readiness.sh
      - name: Verify PRD release roadmap (§11) matches release-roadmap.json
        run: node .nezam/scripts/prd/render-release-roadmap.mjs --check
      - name: Validate canonical gate manifest structure
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          candidates = [
              Path(".nezam/gates/GITHUB_GATE_MATRIX.json"),
          ]
          path = next((p for p in candidates if p.exists()), None)
          if path is None:
              raise SystemExit(
                  "Missing gate manifest (expected one of: "
                  + ", ".join(str(p) for p in candidates)
                  + ")"
              )

          data = json.loads(path.read_text())
          required = [
              "manifestVersion",
              "generatedAt",
              "owners",
              "gateProfiles",
              "gates",
              "taxonomy",
              "severityModel",
              "bypassBanRules",
          ]
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Gate manifest missing keys: {', '.join(missing)}")

          if not data["gates"]:
              raise SystemExit("Gate manifest must include at least one gate")

          valid_stages = {"start", "end", "pre_merge", "post_merge", "nightly_self_test"}
          stages = {gate.get("stage") for gate in data["gates"]}
          absent = valid_stages - stages
          if absent:
              raise SystemExit(f"Gate manifest missing stage examples: {', '.join(sorted(absent))}")

          print("Gate manifest structure checks passed.")
          PY

  design-gate-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - name: Verify design-system gate artifacts and references
        run: |
          set -euo pipefail

          design_template="docs/templates/research-design/DESIGN.template.md"
          feature_spec="docs/templates/specs/FEATURE_SPEC.template.md"
          if [[ ! -f "$design_template" ]]; then
            echo "Missing $design_template"
            exit 1
          fi
          if [[ ! -f "$feature_spec" ]]; then
            feature_spec="docs/templates/specs/FEATURE_SPEC.template.md"
          fi
          if [[ ! -f "$feature_spec" ]]; then
            echo "Missing FEATURE_SPEC template (workspace or docs/templates)."
            exit 1
          fi

          # Required template sections (grep: portable on ubuntu-latest without ripgrep).
          grep -Fq "## 5. Typography" "$design_template"
          grep -Fq "### 5.1 Fluid type scale" "$design_template"
          grep -Fq "### 5.2 Breakpoint and container-query matrix" "$design_template"
          grep -Fq "### 7.1 Motion tokens" "$design_template"
          grep -Fq "### 7.3 Progressive 3D fallback specification" "$design_template"

          grep -Fq "## Component API and variant map" "$feature_spec"
          grep -Fq "## Motion and reduced-motion contract" "$feature_spec"

          # Hardening performance contract must be populated (non-empty).
          perf_populated=0
          for candidate in \
            "docs/plans/05-harden/02-performance/perf.md"; do
            if [[ -s "$candidate" ]]; then
              perf_populated=1
              break
            fi
          done
          if [[ "$perf_populated" -ne 1 ]]; then
            echo "Performance hardening contract must exist and be non-empty. Tried:"
            echo "  docs/plans/05-harden/02-performance/perf.md"
            echo "  docs/workspace/plans/05-harden/02-performance/perf.md"
            echo "  docs/workspace/plans/04-harden/perf.md"
            exit 1
          fi

          # Prevent drift back to deleted legacy rule names (pre-NEZAM rebrand).
          if [[ -d docs/workspace/context ]] && \
            grep -RInE 'coia-orchestration\.mdc|coia-sdd-design\.mdc|coia-design-gates-pro\.mdc' docs/workspace/context; then
            echo "Found legacy COIA rule references in docs/workspace/context."
            exit 1
          fi

          echo "Design gate readiness checks passed."

  ai-sync-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - name: Verify cross-client AI sync drift
        run: |
          node .nezam/scripts/checks/check-ai-drift.js

  docs-layout-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - name: Enforce docs/core + docs/reports layout
        run: bash .nezam/scripts/checks/docs-layout-policy.sh

  automation-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - name: Automation smoke (baseline wiring)
        run: |
          set -euo pipefail
          test -f .nezam/gates/GITHUB_GATE_MATRIX.json
          test -f .nezam/scripts/checks/check-onboarding-readiness.sh
          test -f .github/workflows/ci.yml
          echo "Automation smoke passed."

  placeholder:
    runs-on: ubuntu-latest
    needs: readiness
    steps:
      - uses: actions/checkout@v5.0.1
      - name: No-op scaffold
        run: |
          echo "Replace this job with your real toolchain (pnpm test, mise, cargo, …)."
          test -f README.md

  nightly-automation-self-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - name: Nightly automation baseline self-test
        run: |
          set -euo pipefail
          test -f .nezam/gates/GITHUB_GATE_MATRIX.json
          test -f .nezam/scripts/checks/check-onboarding-readiness.sh
          test -f .github/workflows/ci.yml
          echo "Nightly automation self-test baseline passed."

  policy-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [branch-policy, conventional-commits, readiness, design-gate-readiness, ai-sync-drift, docs-layout-policy, automation-smoke]
    steps:
      - name: Confirm governance checks passed
        run: echo "Branch naming, commit policy, and readiness checks passed."
