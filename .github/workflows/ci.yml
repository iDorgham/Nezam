name: ci

on:
  push:
    branches: [main, 'release/**', 'feature/**']
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ -z "$BRANCH_NAME" ]]; then
            echo "Missing head branch name from pull request context."
            exit 1
          fi

          if [[ "$BRANCH_NAME" =~ ^(feature|release|hotfix)\/[a-z0-9._-]+$ ]]; then
            echo "Branch naming check passed: $BRANCH_NAME"
            exit 0
          fi

          echo "Branch naming check failed: $BRANCH_NAME"
          echo "Expected one of:"
          echo "  feature/<spec-id-or-topic>"
          echo "  release/<x.y.z>"
          echo "  hotfix/<x.y.z>"
          exit 1

  conventional-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate conventional commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          COMMITS="$(git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}")"
          if [[ -z "$COMMITS" ]]; then
            echo "No commits found in PR range."
            exit 1
          fi

          INVALID=0
          REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: .+'

          for SHA in $COMMITS; do
            SUBJECT="$(git log --format=%s -n 1 "$SHA")"
            if [[ ! "$SUBJECT" =~ $REGEX ]]; then
              echo "Invalid conventional commit: $SHA -> $SUBJECT"
              INVALID=1
            fi
          done

          if [[ "$INVALID" -ne 0 ]]; then
            echo "Conventional commit validation failed."
            echo "Format: type(scope): summary"
            echo "Allowed types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
            exit 1
          fi

          echo "Conventional commit validation passed."

  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify onboarding planning artifacts
        run: ./scripts/checks/check-onboarding-readiness.sh
      - name: Validate canonical gate manifest structure
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/workspace/plans/gates/GITHUB_GATE_MATRIX.json")
          if not path.exists():
              raise SystemExit("Missing docs/workspace/plans/gates/GITHUB_GATE_MATRIX.json")

          data = json.loads(path.read_text())
          required = [
              "manifestVersion",
              "generatedAt",
              "owners",
              "gateProfiles",
              "gates",
              "taxonomy",
              "severityModel",
              "bypassBanRules",
          ]
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Gate manifest missing keys: {', '.join(missing)}")

          if not data["gates"]:
              raise SystemExit("Gate manifest must include at least one gate")

          valid_stages = {"start", "end", "pre_merge", "post_merge", "nightly_self_test"}
          stages = {gate.get("stage") for gate in data["gates"]}
          absent = valid_stages - stages
          if absent:
              raise SystemExit(f"Gate manifest missing stage examples: {', '.join(sorted(absent))}")

          print("Gate manifest structure checks passed.")
          PY

  design-gate-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify design-system gate artifacts and references
        run: |
          set -euo pipefail

          # Required template sections for design-first development.
          rg -q "## 5\\. Typography" docs/workspace/templates/research-design/DESIGN.template.md
          rg -q "### 5\\.1 Fluid type scale" docs/workspace/templates/research-design/DESIGN.template.md
          rg -q "### 5\\.2 Breakpoint and container-query matrix" docs/workspace/templates/research-design/DESIGN.template.md
          rg -q "### 7\\.1 Motion tokens" docs/workspace/templates/research-design/DESIGN.template.md
          rg -q "### 7\\.3 Progressive 3D fallback specification" docs/workspace/templates/research-design/DESIGN.template.md

          rg -q "## Component API and variant map" docs/workspace/templates/specs/FEATURE_SPEC.template.md
          rg -q "## Motion and reduced-motion contract" docs/workspace/templates/specs/FEATURE_SPEC.template.md

          # Hardening contract must be populated, not empty.
          if [[ ! -s docs/workspace/plans/04-harden/perf.md ]]; then
            echo "docs/workspace/plans/04-harden/perf.md must be populated before merge."
            exit 1
          fi

          # Prevent drift back to deleted legacy rule names (pre-NEZAM rebrand).
          if rg -n "coia-orchestration\\.mdc|coia-sdd-design\\.mdc|coia-design-gates-pro\\.mdc" docs/workspace/context; then
            echo "Found legacy COIA rule references in docs/workspace/context."
            exit 1
          fi

          echo "Design gate readiness checks passed."

  ai-sync-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cross-client AI sync drift
        run: |
          node scripts/check-ai-drift.js

  docs-layout-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce docs/core + docs/reports layout
        run: bash scripts/checks/docs-layout-policy.sh

  placeholder:
    runs-on: ubuntu-latest
    needs: readiness
    steps:
      - uses: actions/checkout@v4
      - name: No-op scaffold
        run: |
          echo "Replace this job with your real toolchain (pnpm test, mise, cargo, …)."
          test -f README.md

  nightly-automation-self-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Nightly automation baseline self-test
        run: |
          set -euo pipefail
          test -f docs/workspace/plans/gates/GITHUB_GATE_MATRIX.json
          test -f scripts/checks/check-onboarding-readiness.sh
          test -f .github/workflows/ci.yml
          echo "Nightly automation self-test baseline passed."

  policy-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [branch-policy, conventional-commits, readiness, design-gate-readiness, ai-sync-drift, docs-layout-policy]
    steps:
      - name: Confirm governance checks passed
        run: echo "Branch naming, commit policy, and readiness checks passed."
