name: NEZAM CI

on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: pnpm/action-setup@v6
        with:
          version: 8
          
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Run checks
        run: pnpm check:all
