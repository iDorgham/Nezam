# version: 1.0.0
# owner: PM-01
name: NEZAM PR Gates
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  design-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:tokens
      - run: pnpm ai:check
      - run: bash .nezam/scripts/checks/check-spec-versions.sh
      - run: bash .nezam/scripts/checks/check-sdd-integrity.sh
      - run: bash .nezam/scripts/checks/sdd-gate-validator.sh
