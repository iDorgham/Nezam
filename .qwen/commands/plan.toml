│  SCREEN: [Screen Name]     ID: [screen_id]                  │
│  Journey: [where in user flow]    Type: [page type]         │
│  Breakpoint: [Desktop 1440px / Mobile 390px]                │
└─────────────────────────────────────────────────────────────┘

DESKTOP LAYOUT — 12-column grid, 1440px
┌──────────────────────────────────────────────────────────────┐
