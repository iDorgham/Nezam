# Egyptian Arabic Content Master — content brief schema (v1.2)
# Consumed by humans/agents; optional future validation tooling.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://aiwf.local/schemas/egyptian_arabic_content_brief_v1_2.json"
title: egyptian_arabic_content_brief
type: object
required:
  - tone
  - channel
  - sector
properties:
  tone:
    type: string
    description: Maps to tone_matrix.md slug or display name agreed by team.
  channel:
    type: string
    enum:
      - website
      - blog
      - social
      - video
      - email
      - ads
      - legal_ux
  sector:
    type: string
    description: "Vertical key, e.g. fintech, hospitality, realestate, health, generic."
  locale:
    type: string
    enum: [ar-eg, en, bilingual]
    default: ar-eg
  asset_type:
    type: string
    description: "hero, caption, longform, video_script, business_comms, etc."
  word_count:
    type: integer
    minimum: 1
  cta:
    type: string
  banned_claims:
    type: array
    items: { type: string }
    description: Phrases or claim types the draft must never assert.
  legal_sensitivity:
    type: string
    enum: [none, consumer_privacy, regulated]
    default: none
additionalProperties: true
