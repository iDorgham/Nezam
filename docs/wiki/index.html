<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NEZAM Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="NEZAM workspace orchestration — SDD, agents, commands, and gates." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --wiki-accent: #1f6feb;
      --wiki-sidebar-bg: #f6f8fa;
    }
    .sidebar {
      background: var(--wiki-sidebar-bg);
      border-right: 1px solid #d0d7de;
    }
    .sidebar-nav li.active > a {
      color: var(--wiki-accent);
      font-weight: 600;
    }
    .markdown-section footer.custom-wiki-footer {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid #d0d7de;
      font-size: 0.9rem;
      color: #57606a;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: "NEZAM Wiki",
      repo: "https://github.com/iDorgham/Nezam",
      homepage: "Home.md",
      loadSidebar: true,
      loadFooter: true,
      auto2top: true,
      relativePath: true,
      routerMode: "hash",
      subMaxLevel: 3,
      notFoundPage: "Home.md",
      search: {
        paths: "auto",
        placeholder: "Search the wiki…",
        depth: 3,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
